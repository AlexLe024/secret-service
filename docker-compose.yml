services:
  postgres:
    image: postgres:16-alpine
    pull_policy: never
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secret_service
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    pull_policy: never
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: secret_service
      DB_SSLMODE: disable
      JWT_SECRET: "change-me-in-production-use-32chars"
      # Сгенерируй свой ключ: openssl rand -hex 32
      AES_KEY_HEX: "1c1007da9d60206f0aaf4f0162c1436607aacf7c827dc2f9af7dc3059a1644c9"
      ADDR: ":8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
